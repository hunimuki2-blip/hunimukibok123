name: Deploy to Railway

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Install dependencies
        run: npm install
      
      - name: Build frontend
        run: |
          cd frontend
          npm install
          npm run build
          cd ..
      
      - name: Copy build files to root for Railway
        run: |
          # Railway needs all static files at the root level
          # Copy everything from frontend/build to root
          echo "Copying frontend/build/* to root..."
          cp -r frontend/build/* .
          cp -r frontend/build/.* . 2>/dev/null || true
          
          # Verify index.html exists at root
          echo "Checking for index.html at root..."
          ls -la index.html
          
          # Also verify static files
          echo "Checking static files..."
          ls -la static/
      
      - name: Verify files before deploy
        run: |
          echo "=== Files at root ==="
          ls -la
          echo ""
          echo "=== index.html content ==="
          cat index.html
      
      - name: Deploy to Railway
        uses: railwayapp/railway-deploy@v1.0.0
        with:
          railway_token: ${{ secrets.RAILWAY_TOKEN }}
          project_id: ${{ secrets.RAILWAY_PROJECT_ID }}
          service_id: ${{ secrets.RAILWAY_SERVICE_ID }}

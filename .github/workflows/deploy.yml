name: Deploy to Railway

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Install dependencies
        run: npm install
      
      - name: Build frontend
        run: |
          cd frontend
          npm install
          npm run build
          cd ..
      
      - name: Copy build to root for Railway
        run: |
          # Copy frontend build to root so Railway can find index.html
          cp -r frontend/build/* .
          # Also keep the frontend/build for local reference
          echo "Build files copied to root"
          ls -la index.html
      
      - name: Deploy to Railway
        uses: railwayapp/railway-deploy@v1.0.0
        with:
          railway_token: ${{ secrets.RAILWAY_TOKEN }}
          project_id: ${{ secrets.RAILWAY_PROJECT_ID }}
          service_id: ${{ secrets.RAILWAY_SERVICE_ID }}

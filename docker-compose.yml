version: '3.8'

services:
  app:
    build: .
    container_name: clipvibe
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - MONGO_URI=mongodb://mongo:27017/clipvibe
      - JWT_SECRET=${JWT_SECRET:-clipvibe-secret-key-change-me}
    depends_on:
      - mongo
    volumes:
      - ./public/uploads:/app/public/uploads
    networks:
      - clipvibe-network

  mongo:
    image: mongo:6
    container_name: clipvibe-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_DATABASE=clipvibe
    volumes:
      - mongo-data:/data/db
    networks:
      - clipvibe-network

  mongo-express:
    image: mongo-express:latest
    container_name: clipvibe-mongo-express
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      - ME_CONFIG_MONGODB_SERVER=mongo
      - ME_CONFIG_MONGODB_URL=mongodb://mongo:27017/clipvibe
      - ME_CONFIG_BASICAUTH_USERNAME=admin
      - ME_CONFIG_BASICAUTH_PASSWORD=admin
    depends_on:
      - mongo
    networks:
      - clipvibe-network

volumes:
  mongo-data:

networks:
  clipvibe-network:
    driver: bridge
